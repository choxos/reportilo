# shinytest2 smoke for the bundled Shiny app. R CMD check does not run
# skip_on_cran() tests, so this dedicated job exercises the app in a headless
# Chrome with NOT_CRAN set. Kept off the CRAN check path on purpose.
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master, "release/**"]

name: shiny-tests.yaml

permissions: read-all

jobs:
  shinytest2:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      NOT_CRAN: "true"
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: browser-actions/setup-chrome@v1

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::shinytest2
            any::chromote
            any::testthat
          dependencies: '"all"'

      - name: Install the package
        run: R CMD INSTALL .

      - name: Run shinytest2 smoke
        run: |
          Rscript -e 'library(reportilo); testthat::test_dir("tests/testthat", filter = "shiny-app", stop_on_failure = TRUE, reporter = testthat::SummaryReporter$new())'
