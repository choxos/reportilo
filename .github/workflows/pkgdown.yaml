# Build the pkgdown documentation site and publish it at the gh-pages root
# (https://choxos.github.io/reportilo/). The browser app lives on the separate
# `webapp` branch and is published into gh-pages /app by its own deploy-app
# workflow; this workflow deploys with clean: false so it overlays the root and
# never deletes the /app subtree.
on:
  push:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown.yaml

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, local::.
          needs: website

      - name: Build pkgdown site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE, dest_dir = "docs")
        shell: Rscript {0}

      - name: Deploy to gh-pages root (preserve /app)
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: docs
          clean: false
          commit-message: "Deploy pkgdown site [skip ci]"
